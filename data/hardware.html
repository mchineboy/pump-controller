<body>
  <header class="site-header">
    <p class="brand">Precision Pump Controller</p>
    <nav>

  <main>
    <section class="panel">
      <h1>Hardware</h1>
      <p class="meta">ELEGOO ESP32 Dev Board · STEP/DIR/ENABLE · optional valve</p>
      <dl class="summary">
        <div><dt>STEP</dt><dd>GPIO 26</dd></div>
        <div><dt>DIR</dt><dd>GPIO 27</dd></div>
        <div><dt>ENABLE</dt><dd>GPIO 25 (active low)</dd></div>
        <div><dt>VALVE</dt><dd>GPIO 33 (optional)</dd></div>
        <div><dt>ESTOP</dt><dd>GPIO 32 (optional, active low)</dd></div>
      </dl>
      <p id="live-status" class="status-line">Loading status…</p>
    </section>
  </main>

  <script type="module" src="/js/hardware.js"></script>
