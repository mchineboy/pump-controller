<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Diagnostics — Fluid Dispensing Controller</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header class="site-header">
    <p class="brand">Fluid Dispensing Controller</p>
    <nav>
      <a href="/">Dispense</a>
      <a href="/calibration.html">Calibration</a>
      <a href="/profiles.html">Profiles</a>
      <a href="/diagnostics.html" aria-current="page">Diagnostics</a>
      <a href="/hardware.html">Hardware</a>
    </nav>
  </header>

  <main>
    <section class="panel">
      <h1>Settings</h1>
      <form id="settings-form">
        <label>
          Device name
          <input id="device-name" type="text" required>
        </label>
        <label class="checkbox">
          <input id="logging" type="checkbox">
          Event logging enabled
        </label>
        <label class="checkbox">
          <input id="web-auth" type="checkbox">
          Require local password (admin / secrets.h)
        </label>
        <label class="checkbox">
          <input id="valve-hw" type="checkbox">
          Valve hardware present (GPIO valve driver interface)
        </label>
        <label class="checkbox">
          <input id="estop-en" type="checkbox">
          Emergency stop input enabled (GPIO 32, active low to GND)
        </label>
        <fieldset>
          <legend>TMC2209 UART (optional)</legend>
          <label class="checkbox">
            <input id="driver-uart" type="checkbox">
            Enable UART config (RX GPIO 16, TX GPIO 17)
          </label>
          <label>
            Run current (mA)
            <input id="tmc-run-ma" type="number" min="100" max="2000" step="50">
          </label>
          <label>
            Hold current (mA)
            <input id="tmc-hold-ma" type="number" min="0" max="2000" step="50">
          </label>
          <label>
            Microsteps
            <select id="tmc-microsteps">
              <option value="8">8</option>
              <option value="16">16</option>
              <option value="32">32</option>
              <option value="64">64</option>
              <option value="128">128</option>
              <option value="256">256</option>
            </select>
          </label>
          <label class="checkbox">
            <input id="tmc-stealth" type="checkbox">
            StealthChop (quiet)
          </label>
        </fieldset>
        <fieldset>
          <legend>Reservoir level sensor (optional)</legend>
          <label class="checkbox">
            <input id="reservoir-en" type="checkbox">
            Enable reservoir empty input (GPIO 34)
          </label>
          <label class="checkbox">
            <input id="reservoir-empty-low" type="checkbox">
            Empty signal is active-low
          </label>
          <label>
            Empty policy
            <select id="reservoir-policy">
              <option value="warn">Warn only</option>
              <option value="block">Block new dispense/calibrate</option>
              <option value="fault">Fault active operations</option>
            </select>
          </label>
        </fieldset>
        <div class="actions">
          <button type="submit">Save settings</button>
        </div>
      </form>
      <p id="settings-status" class="meta"></p>
      <p id="estop-live" class="status-line">ESTOP: —</p>
      <p id="tmc-live" class="status-line">TMC UART: —</p>
      <p id="tmc-diag" class="status-line">Driver flags: —</p>
      <p id="reservoir-live" class="status-line">Reservoir: —</p>
      <div class="actions">
        <button type="button" id="inject-driver-fault-btn">Simulate driver fault</button>
        <button type="button" id="ack-fault-btn">Acknowledge fault</button>
      </div>
    </section>

    <section class="panel">
      <h2>Event log</h2>
      <div class="actions">
        <button type="button" id="refresh-log-btn">Refresh</button>
        <button type="button" id="clear-log-btn" class="danger">Clear log</button>
      </div>
      <ul id="event-list"></ul>
    </section>
  </main>

  <script type="module" src="/js/diagnostics.js"></script>
</body>
</html>
