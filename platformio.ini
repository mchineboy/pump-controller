; ELEGOO ESP32 Dev Board (ESP32-WROOM-32, CP2102, USB-C)
; Pinout matches classic 30-pin DevKit layout.

[env:esp32dev]
platform = espressif32 @ 6.9.0
board = esp32dev
framework = arduino
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs
board_build.partitions = default.csv
board_build.arduino.upstream_packages = no

build_flags =
	-DCORE_DEBUG_LEVEL=1
	-DPUMP_STEP_PIN=26
	-DPUMP_DIR_PIN=27
	-DPUMP_ENABLE_PIN=25
	-DPUMP_VALVE_PIN=33
	-DPUMP_ESTOP_PIN=32
	-DPUMP_TMC_RX_PIN=16
	-DPUMP_TMC_TX_PIN=17
	-DPUMP_RESERVOIR_PIN=34
	-DPUMP_LOADCELL_DT_PIN=19
	-DPUMP_LOADCELL_SCK_PIN=18
	-DPUMP_TEMP_PIN=23
	-DPUMP_FLOW_PIN=4
	-DPUMP2_STEP_PIN=5
	-DPUMP2_DIR_PIN=13
	-DPUMP2_ENABLE_PIN=14
	-DPUMP2_VALVE_PIN=21
	-DPUMP2_TMC_ADDRESS=1
	-DPUMP3_STEP_PIN=22
	-DPUMP3_DIR_PIN=15
	-DPUMP3_ENABLE_PIN=2
	-DPUMP3_VALVE_PIN=12
	-DPUMP3_TMC_ADDRESS=2

lib_deps =
	bblanchon/ArduinoJson @ ^7.3.0
	ESP32Async/AsyncTCP @ ^3.3.2
	ESP32Async/ESPAsyncWebServer @ ^3.6.0
	teemuatlut/TMCStepper @ ^0.7.3
	paulstoffregen/OneWire @ ^2.3.8
	milesburton/DallasTemperature @ ^3.11.0

; Upload filesystem image (web assets) with: pio run -t uploadfs
